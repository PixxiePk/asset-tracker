<script>
    const params = new URLSearchParams(window.location.search);
    const assetId = params.get('id').trim().toLowerCase();
    const container = document.getElementById('data-container');

    // LIST ALL YOUR BATCH FILES HERE
    const databaseFiles = ['batch1.json', 'batch2.json', 'batch3.json']; 

    async function findAsset() {
        for (const file of databaseFiles) {
            try {
                const response = await fetch(file + '?v=' + new Date().getTime());
                const db = await response.json();
                
                // Fuzzy search in this specific batch
                const matchedKey = Object.keys(db).find(k => String(k).trim().toLowerCase() === assetId);
                
                if (matchedKey) {
                    const assetData = db[matchedKey];
                    container.innerHTML = '';
                    for (const [key, value] of Object.entries(assetData)) {
                        if (value && String(value).trim() !== "") {
                            container.innerHTML += `<div class="data-row"><div class="label">${key}</div><div class="value">${value}</div></div>`;
                        }
                    }
                    return; // Found it! Stop searching.
                }
            } catch (e) { console.log("Skipping " + file); }
        }
        container.innerHTML = '<div class="empty-state">Asset not found in any batch.</div>';
    }

    findAsset();
</script>
